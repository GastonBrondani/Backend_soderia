name: Deploy Backend (Droplet)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy en Droplet
        run: |
          ssh ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} << 'EOF'
            set -e

            cd /opt/soderia/app/backend

            git fetch origin
            git reset --hard origin/main

            docker compose restart backend

            docker compose exec -T backend alembic upgrade heads
          EOF